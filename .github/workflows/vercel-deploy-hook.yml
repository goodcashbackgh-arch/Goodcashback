name: Trigger Vercel Production Deploy

on:
  workflow_dispatch:

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook for latest main
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is missing."
            exit 1
          fi

          curl -fsS -X POST "${VERCEL_DEPLOY_HOOK_URL}?buildCache=false"
