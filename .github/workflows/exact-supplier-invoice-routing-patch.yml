name: Exact supplier invoice routing patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-build-commit:
    if: github.head_ref == 'agent/fix-exact-supplier-invoice-routing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-exact-supplier-invoice-routing
          fetch-depth: 0

      - name: Apply scoped exact-invoice patch
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def patch_section(text, start_marker, end_marker, pairs, label):
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              section = text[start:end]
              for old, new in pairs:
                  if section.count(old) != 1:
                      raise SystemExit(f"{label}: expected one match for {old[:80]!r}, found {section.count(old)}")
                  section = section.replace(old, new, 1)
              return text[:start] + section + text[end:]

          Path("app/internal/reconciliation/reconciliationHref.ts").write_text('''type ReconciliationResult = {\n  success?: string;\n  error?: string;\n};\n\nexport function supplierInvoiceReconciliationHref(\n  orderId: string,\n  supplierInvoiceId: string,\n  result: ReconciliationResult = {},\n) {\n  const query = new URLSearchParams({ supplier_invoice_id: supplierInvoiceId });\n  if (result.success) query.set("success", result.success);\n  if (result.error) query.set("error", result.error);\n  return `/internal/reconciliation/${orderId}?${query.toString()}`;\n}\n''')

          # Every supplier queue card now routes with the exact immutable invoice id.
          path = Path("app/internal/supplier-draft-ready/page.tsx")
          text = path.read_text()
          text = replace_once(
              text,
              'import { createClient } from "@/utils/supabase/server";\n',
              'import { createClient } from "@/utils/supabase/server";\nimport { supplierInvoiceReconciliationHref } from "../reconciliation/reconciliationHref";\n',
              "supplier queue helper import",
          )
          old_link = 'href={`/internal/reconciliation/${invoice.order_id}`}'
          if text.count(old_link) != 3:
              raise SystemExit(f"supplier queue exact links: expected 3, found {text.count(old_link)}")
          path.write_text(text.replace(old_link, 'href={supplierInvoiceReconciliationHref(invoice.order_id, invoice.id)}'))

          # The workspace resolves the requested active invoice and never guesses for multi-invoice orders.
          path = Path("app/internal/reconciliation/[order_id]/page.tsx")
          text = path.read_text()
          text = replace_once(
              text,
              'import { createClient } from "@/utils/supabase/server";\n',
              'import { createClient } from "@/utils/supabase/server";\nimport { supplierInvoiceReconciliationHref } from "../reconciliationHref";\n',
              "workspace helper import",
          )
          text = replace_once(
              text,
              'type SearchParams = { success?: string; error?: string };',
              'type SearchParams = { success?: string; error?: string; supplier_invoice_id?: string };',
              "workspace search parameters",
          )
          old_query = '''  const { data: invoice } = await supabase\n    .from("supplier_invoices")\n    .select("id, invoice_ref, invoice_pdf_url, uploaded_at, ocr_invoice_ref, ocr_retailer_name, ocr_invoice_total_gbp, ocr_extracted_at, review_status, is_current_for_order, blocked_from_sage_yn")\n    .eq("order_id", orderId)\n    .order("uploaded_at", { ascending: false })\n    .limit(1)\n    .maybeSingle();'''
          new_query = '''  const requestedInvoiceId = qp.supplier_invoice_id?.trim() ?? "";\n  const { data: invoiceRows } = await supabase\n    .from("supplier_invoices")\n    .select("id, invoice_ref, invoice_pdf_url, uploaded_at, ocr_invoice_ref, ocr_retailer_name, ocr_invoice_total_gbp, ocr_extracted_at, review_status, is_current_for_order, blocked_from_sage_yn")\n    .eq("order_id", orderId)\n    .order("uploaded_at", { ascending: false });\n\n  const retiredStatuses = new Set(["rejected_resubmit_required", "duplicate_blocked", "superseded"]);\n  const activeInvoices = (invoiceRows ?? []).filter(\n    (candidate) => !retiredStatuses.has(String(candidate.review_status ?? "pending_review")),\n  );\n\n  if (!requestedInvoiceId && activeInvoices.length > 1) {\n    redirect(`/internal/reconciliation/${orderId}/invoice-bundle`);\n  }\n\n  const invoice = requestedInvoiceId\n    ? activeInvoices.find((candidate) => candidate.id === requestedInvoiceId) ?? null\n    : activeInvoices[0] ?? null;\n\n  if (requestedInvoiceId && !invoice) {\n    redirect(`/internal/supplier-draft-ready?error=${encodeURIComponent("Selected supplier invoice is not active for this order.")}`);\n  }'''
          text = replace_once(text, old_query, new_query, "workspace exact invoice loader")
          anchor = '          <p className="mt-2 text-sm text-slate-600">Importer: {importer} · Retailer: {retailer}</p>\n'
          selector = '''          <p className="mt-2 text-sm text-slate-600">Importer: {importer} · Retailer: {retailer}</p>\n          {invoice ? <p className="mt-2 text-sm font-semibold text-slate-800">Selected invoice: {invoice.ocr_invoice_ref || invoice.invoice_ref}</p> : null}\n          {activeInvoices.length > 1 ? (\n            <div className="mt-4 flex flex-wrap gap-2">\n              {activeInvoices.map((candidate) => (\n                <Link\n                  key={candidate.id}\n                  href={supplierInvoiceReconciliationHref(orderId, candidate.id)}\n                  className={`rounded-full px-3 py-1.5 text-xs font-semibold ${candidate.id === invoice?.id ? "bg-sky-700 text-white" : "border border-sky-200 bg-sky-50 text-sky-800"}`}\n                >\n                  {candidate.ocr_invoice_ref || candidate.invoice_ref}\n                </Link>\n              ))}\n            </div>\n          ) : null}\n'''
          path.write_text(replace_once(text, anchor, selector, "workspace selected invoice display"))

          # Only invoice-scoped actions retain invoice identity. Legacy line-only action stays unchanged.
          path = Path("app/internal/reconciliation/[order_id]/actions.ts")
          text = path.read_text()
          text = replace_once(
              text,
              'import { assertInvoiceReadyForCurrentApproval } from "../../invoice-review/readiness";\n',
              'import { assertInvoiceReadyForCurrentApproval } from "../../invoice-review/readiness";\nimport { supplierInvoiceReconciliationHref } from "../reconciliationHref";\n',
              "actions helper import",
          )
          text = patch_section(text, 'export async function supervisorProgressSupplierInvoiceLinesAction', 'export async function approveCurrentSupplierInvoiceFromReconciliationAction', [
              ('redirect(`/internal/reconciliation/${orderId}?error=Select+at+least+one+blocked+line+to+progress`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Select at least one blocked line to progress" }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(guard.error)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: guard.error }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(error.message)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: error.message }))'),
              ('redirect(`/internal/reconciliation/${orderId}?success=${encodeURIComponent(`${count} line(s) progressed by supervisor takeover. Continue accounting coding.`)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { success: `${count} line(s) progressed by supervisor takeover. Continue accounting coding.` }))'),
          ], "progress action")
          text = patch_section(text, 'export async function approveCurrentSupplierInvoiceFromReconciliationAction', 'export async function saveAllSupplierLineAccountingCodesAction', [
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(guard.error)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: guard.error }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(readinessError)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: readinessError }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(totalsError?.message ?? "Accounting coding totals not found.")}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: totalsError?.message ?? "Accounting coding totals not found." }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=All+progressed+lines+must+be+accounting+coded+before+approval`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "All progressed lines must be accounting coded before approval" }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(msg)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: msg }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(invoiceError?.message ?? "Supplier invoice not found.")}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: invoiceError?.message ?? "Supplier invoice not found." }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(error.message)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: error.message }))'),
          ], "approval action")
          text = patch_section(text, 'export async function saveAllSupplierLineAccountingCodesAction', 'export async function saveSupplierLineAccountingCodeAction', [
              ('redirect(`/internal/reconciliation/${orderId}?error=No+codable+lines+to+save`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "No codable lines to save" }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(error.message)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: error.message }))'),
              ('redirect(`/internal/reconciliation/${orderId}?success=All+codable+supplier+invoice+lines+saved+and+balanced`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { success: "All codable supplier invoice lines saved and balanced" }))'),
          ], "save-all coding action")
          text = patch_section(text, 'export async function addSupplierAccountingAdjustmentLineAction', 'export async function deleteSupplierAccountingAdjustmentLineAction', [
              ('redirect(`/internal/reconciliation/${orderId}?error=Adjustment+description+is+required`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Adjustment description is required" }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=Adjustment+quantity+must+be+greater+than+zero`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Adjustment quantity must be greater than zero" }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=Adjustment+net+and+VAT+are+required`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Adjustment net and VAT are required" }))'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(error.message)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: error.message }))'),
              ('redirect(`/internal/reconciliation/${orderId}?success=Adjustment+line+added`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { success: "Adjustment line added" }))'),
          ], "add adjustment action")
          delete_start = text.index('export async function deleteSupplierAccountingAdjustmentLineAction')
          delete_section = text[delete_start:]
          delete_section = replace_once(
              delete_section,
              '  const orderId = asString(formData.get("order_id"));\n  const adjustmentLineId = asString(formData.get("adjustment_line_id"));\n\n  if (!orderId || !adjustmentLineId)',
              '  const orderId = asString(formData.get("order_id"));\n  const invoiceId = asString(formData.get("supplier_invoice_id"));\n  const adjustmentLineId = asString(formData.get("adjustment_line_id"));\n\n  if (!orderId || !invoiceId || !adjustmentLineId)',
              "delete adjustment identity",
          )
          delete_section = replace_once(delete_section, 'redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(error.message)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: error.message }))', "delete adjustment error")
          delete_section = replace_once(delete_section, 'redirect(`/internal/reconciliation/${orderId}?success=Adjustment+line+deleted`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { success: "Adjustment line deleted" }))', "delete adjustment success")
          path.write_text(text[:delete_start] + delete_section)

          path = Path("app/internal/reconciliation/[order_id]/adjustmentActions.ts")
          text = path.read_text()
          text = replace_once(text, 'import { createClient } from "@/utils/supabase/server";\n', 'import { createClient } from "@/utils/supabase/server";\nimport { supplierInvoiceReconciliationHref } from "../reconciliationHref";\n', "adjustment helper import")
          text = replace_once(text, '  const orderId = asString(formData.get("order_id"));\n  const adjustmentLineId = asString(formData.get("adjustment_line_id"));', '  const orderId = asString(formData.get("order_id"));\n  const invoiceId = asString(formData.get("supplier_invoice_id"));\n  const adjustmentLineId = asString(formData.get("adjustment_line_id"));', "adjustment update identity")
          text = replace_once(text, 'if (!orderId || !adjustmentLineId)', 'if (!orderId || !invoiceId || !adjustmentLineId)', "adjustment update guard")
          for old, new, label in [
              ('redirect(`/internal/reconciliation/${orderId}?error=Adjustment+description+is+required`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Adjustment description is required" }))', 'adjustment description'),
              ('redirect(`/internal/reconciliation/${orderId}?error=Adjustment+quantity+must+be+greater+than+zero`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Adjustment quantity must be greater than zero" }))', 'adjustment quantity'),
              ('redirect(`/internal/reconciliation/${orderId}?error=Adjustment+net+and+VAT+are+required`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: "Adjustment net and VAT are required" }))', 'adjustment values'),
              ('redirect(`/internal/reconciliation/${orderId}?error=${encodeURIComponent(error.message)}`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { error: error.message }))', 'adjustment error'),
              ('redirect(`/internal/reconciliation/${orderId}?success=Adjustment+line+updated`)', 'redirect(supplierInvoiceReconciliationHref(orderId, invoiceId, { success: "Adjustment line updated" }))', 'adjustment success'),
          ]:
              text = replace_once(text, old, new, label)
          path.write_text(text)

          path = Path("app/internal/reconciliation/[order_id]/ManualAdjustmentRows.tsx")
          text = path.read_text()
          old = '<input type="hidden" name="order_id" value={orderId} />\n                  <input type="hidden" name="adjustment_line_id" value={line.id} />'
          new = '<input type="hidden" name="order_id" value={orderId} />\n                  <input type="hidden" name="supplier_invoice_id" value={invoiceId} />\n                  <input type="hidden" name="adjustment_line_id" value={line.id} />'
          if text.count(old) != 2:
              raise SystemExit(f"adjustment forms: expected 2, found {text.count(old)}")
          path.write_text(text.replace(old, new))

          path = Path("app/internal/reconciliation/[order_id]/invoice-bundle/[supplier_invoice_id]/page.tsx")
          text = path.read_text()
          text = replace_once(text, 'import { createClient } from "@/utils/supabase/server";\n', 'import { createClient } from "@/utils/supabase/server";\nimport { supplierInvoiceReconciliationHref } from "../../../reconciliationHref";\n', "exact invoice helper import")
          text = replace_once(text, '<Link href={`/internal/reconciliation/${orderId}`} className="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800">Accounting workspace</Link>', '<Link href={supplierInvoiceReconciliationHref(orderId, invoiceId)} className="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800">Accounting workspace</Link>', "exact invoice accounting link")
          path.write_text(text)

      - name: Verify patch boundaries
        run: |
          git diff --check
          test "$(git diff --name-only | grep -E '^(supabase/|docs/governing-pack/|docs/testing/)' || true)" = ""
          python - <<'PY'
          from pathlib import Path
          queue = Path('app/internal/supplier-draft-ready/page.tsx').read_text()
          workspace = Path('app/internal/reconciliation/[order_id]/page.tsx').read_text()
          actions = Path('app/internal/reconciliation/[order_id]/actions.ts').read_text()
          assert queue.count('supplierInvoiceReconciliationHref(invoice.order_id, invoice.id)') == 3
          assert 'activeInvoices.length > 1' in workspace
          assert 'Selected invoice:' in workspace
          single = actions.split('export async function saveSupplierLineAccountingCodeAction', 1)[1].split('export async function addSupplierAccountingAdjustmentLineAction', 1)[0]
          assert 'invoiceId' not in single
          PY

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Production build and preserve exact error
        shell: bash
        run: |
          set +e
          npm run build > .exact-routing-build.log 2>&1
          status=$?
          cat .exact-routing-build.log
          if [ $status -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .exact-routing-build.log
            git commit -m "Capture exact routing build failure"
            git push origin HEAD:agent/fix-exact-supplier-invoice-routing
            exit 1
          fi
          rm .exact-routing-build.log

      - name: Remove runner and commit final code
        run: |
          rm .github/workflows/exact-supplier-invoice-routing-patch.yml
          git checkout -- package-lock.json 2>/dev/null || true
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix exact supplier invoice reconciliation routing"
          git push origin HEAD:agent/fix-exact-supplier-invoice-routing
