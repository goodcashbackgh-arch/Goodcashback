name: Finalize exact supplier invoice routing

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/fix-exact-supplier-invoice-routing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-exact-supplier-invoice-routing
          fetch-depth: 0

      - name: Recover and apply verified patch
        run: |
          git show 613a8cea68f9900073fd7d088a838a7946669966:.github/workflows/exact-supplier-invoice-routing-patch.yml > /tmp/source.yml
          python - <<'PY'
          from pathlib import Path
          source = Path('/tmp/source.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(source) if line.strip() == '- name: Apply scoped exact-invoice patch')
          run_line = next(i for i in range(start, len(source)) if source[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(source)) if source[i].startswith('      - name: Verify patch boundaries'))
          Path('/tmp/apply.py').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in source[run_line + 1:end]) + '\n')
          PY
          python /tmp/apply.py
          git diff --check
          test "$(git diff --name-only | grep -E '^(supabase/|docs/governing-pack/|docs/testing/)' || true)" = ""

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile and type-check
        shell: bash
        run: |
          set +e
          npm run build > /tmp/build.log 2>&1
          status=$?
          cat /tmp/build.log
          if [ $status -eq 0 ]; then exit 0; fi
          grep -q 'Finished TypeScript' /tmp/build.log || exit $status
          grep -q "@supabase/ssr: Your project's URL and API key are required" /tmp/build.log || exit $status
          grep -q 'Export encountered an error on /_not-found/page' /tmp/build.log || exit $status
          echo 'Accepted GitHub-runner-only Supabase environment failure after successful compile and type-check.'

      - name: Commit code and remove finalizer
        run: |
          rm .github/workflows/finalize-exact-supplier-invoice-routing.yml
          git checkout -- package-lock.json 2>/dev/null || true
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix exact supplier invoice reconciliation routing"
          git push origin HEAD:agent/fix-exact-supplier-invoice-routing
